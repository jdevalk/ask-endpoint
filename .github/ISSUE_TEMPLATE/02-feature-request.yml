name: Feature Request
description: Suggest an improvement or new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's missing?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've thought about
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Index generation
        - Search / retrieval
        - LLM answer generation
        - Streaming
        - Configuration
        - Documentation
        - Other
    validations:
      required: true
